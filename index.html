<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeuralAds</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: #06080f;
  color: #e4eaf6;
  font-family: 'DM Mono', monospace;
  overflow: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 10;
}

.glow {
  position: fixed;
  border-radius: 50%;
  filter: blur(140px);
  pointer-events: none;
}
.g1 { width: 700px; height: 700px; background: rgba(60,120,255,0.07); top: -200px; left: -200px; }
.g2 { width: 500px; height: 500px; background: rgba(140,80,255,0.06); bottom: -150px; right: -150px; }

main {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  z-index: 1;
  text-align: center;
}

.logo {
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  margin-bottom: 4rem;
}

h1 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: clamp(2.6rem, 6vw, 5.5rem);
  line-height: 1.1;
  letter-spacing: -0.02em;
  max-width: 820px;
  margin-bottom: 2.5rem;
}

h1 em {
  font-style: italic;
  color: #5b9aff;
}

p {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.06em;
  line-height: 1.8;
  max-width: 480px;
  margin-bottom: 3.5rem;
}

a.cta {
  display: inline-block;
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  padding-bottom: 4px;
  transition: color 0.2s, border-color 0.2s;
}

a.cta:hover {
  color: #fff;
  border-color: rgba(255,255,255,0.5);
}

footer {
  position: fixed;
  bottom: 2rem;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2.5rem;
  z-index: 2;
}

.f-left, .f-right {
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.18);
  text-transform: uppercase;
}

.pulse {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.18);
  text-transform: uppercase;
}

.pulse::before {
  content: '';
  width: 5px;
  height: 5px;
  background: #5b9aff;
  border-radius: 50%;
  animation: blink 2.4s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

main > * { animation: rise 1s ease both; }
.logo  { animation-delay: 0s; }
h1     { animation-delay: 0.15s; }
p      { animation-delay: 0.3s; }
a.cta  { animation-delay: 0.45s; }

@keyframes rise {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}

@media (max-width: 600px) {
  h1 { font-size: 2.4rem; }
  footer { padding: 0 1.5rem; }
}
</style>
</head>
<body>

<div class="glow g1"></div>
<div class="glow g2"></div>

<main>
  <div class="logo">NeuralAds</div>

  <h1>AI agents that create ads to <em>directly impact</em> the brain</h1>

  <p>
    Built at Carnegie Mellon University.<br/>
    Powered by neuroscience. Coming soon.
  </p>

  <a href="mailto:team@neuralads.ai" class="cta">Get early access</a>
</main>

<footer>
  <span class="f-left">Carnegie Mellon University &middot; Pittsburgh, PA</span>
  <span class="pulse">Building</span>
  <span class="f-right">&copy; 2026 NeuralAds</span>
</footer>

</body>
</html>
